name: Publish GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish_gh_pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Extract node version
        run: echo "NODE_VERSION=$(cat .node_version)" >> $GITHUB_ENV
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Transformers.js が DL する HuggingFace モデルをキャッシュし、毎回の再 DL を避ける
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('src/lib/models.ts') }}
          restore-keys: hf-models-
      - name: Install deps
        run: npm ci
      # DOCS の埋め込みを事前計算し public/embeddings/*.parquet を生成する
      # (ブラウザ側はこれを読むことで初回の DOCS 埋め込み計算をスキップできる)
      - name: Precompute embeddings (parquet)
        run: npm run precompute
      - name: Build page
        run: npm run build
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
